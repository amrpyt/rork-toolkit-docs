site_name: Rork Toolkit API — Unofficial Reference
site_description: Evidence-based unofficial documentation for Rork Toolkit API and Chatwoot Captain integration
site_url: https://amrpyt.github.io/rork-toolkit-docs/
repo_url: https://github.com/amrpyt/rork-toolkit-docs
repo_name: amrpyt/rork-toolkit-docs
edit_uri: edit/master/docs/

theme:
  name: material
  language: ar
  direction: rtl
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.suggest

nav:
  - الرئيسية: index.md
  - نظرة عامة: 01-overview.md
  - SDK والمعمارية: 02-sdk-and-architecture.md
  - Text وObject: 03-text-and-object.md
  - Agent والتولز: 04-agent-tools-streaming.md
  - الصور والصوت والاتصالات: 05-images-audio-connections.md
  - الأخطاء والحدود والأداء: 06-errors-limits-performance.md
  - Chatwoot Captain Adapter: 07-chatwoot-captain-adapter.md
  - الأمن والإنتاج: 08-security-production.md
  - مصفوفة الاختبارات: 09-test-matrix.md
  - المصادر ودرجات الثقة: 10-sources-and-confidence.md
  - اختبارات Remote والقدرة: 11-remote-capacity-results.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang:
        - ar
        - en

extra:
  generator: false
  social: []

copyright: Unofficial community documentation. Rork is a trademark of its respective owner.
